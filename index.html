<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leon Konrad</title>
  <style>
    :root {
      --bg: #fafafa;
      --bg-card: #fff;
      --text: #111;
      --text-muted: #555;
      --border: #ddd;
      --border-hover: #111;
      --input-bg: #fff;
      --shadow: rgba(0, 0, 0, 0.06);
      --stripe: rgba(0, 0, 0, 0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e0e;
        --bg-card: #1a1a1a;
        --text: #e8e8e8;
        --text-muted: #999;
        --border: #2a2a2a;
        --border-hover: #e8e8e8;
        --input-bg: #141414;
        --shadow: rgba(0, 0, 0, 0.3);
        --stripe: rgba(255, 255, 255, 0.03);
      }
    }

    [data-theme="dark"] {
      --bg: #0e0e0e;
      --bg-card: #1a1a1a;
      --text: #e8e8e8;
      --text-muted: #999;
      --border: #2a2a2a;
      --border-hover: #e8e8e8;
      --input-bg: #141414;
      --shadow: rgba(0, 0, 0, 0.3);
      --stripe: rgba(255, 255, 255, 0.03);
    }

    [data-theme="light"] {
      --bg: #fafafa;
      --bg-card: #fff;
      --text: #111;
      --text-muted: #555;
      --border: #ddd;
      --border-hover: #111;
      --input-bg: #fff;
      --shadow: rgba(0, 0, 0, 0.06);
      --stripe: rgba(0, 0, 0, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(
          135deg,
          var(--stripe),
          var(--stripe) 1px,
          transparent 1px,
          transparent 12px
        ),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
      padding: 2rem 1rem;
      gap: 3rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text);
      z-index: 10;
    }

    .theme-toggle:hover {
      border-color: var(--border-hover);
    }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon { display: none; }

    /* Default (no data-theme): follow system, show sun for toggle */
    .theme-toggle .icon-sun { display: inline; }
    .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: inline; }

    .hero {
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: var(--border-hover);
      background: var(--bg-card);
    }

    .contact {
      width: 100%;
      max-width: 440px;
    }

    .contact h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .contact form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .contact input,
    .contact textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .contact input:focus,
    .contact textarea:focus {
      border-color: var(--border-hover);
    }

    .contact input::placeholder,
    .contact textarea::placeholder {
      color: var(--text-muted);
    }

    .contact textarea {
      resize: vertical;
      min-height: 120px;
    }

    .contact button {
      padding: 0.7rem 1.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .contact button:hover {
      opacity: 0.85;
    }

    .contact button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-status {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      min-height: 1.4em;
    }

    .form-status.success { color: #22c55e; }
    .form-status.error { color: #ef4444; }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .contact { max-width: 100%; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" aria-label="Toggle dark mode">
    <span class="icon-sun">&#9790;</span>
    <span class="icon-moon">&#9728;</span>
  </button>

  <section class="hero">
    <h1>Leon Konrad</h1>
    <p class="tagline">Software &amp; AI</p>
    <div class="links">
      <a href="https://linkedin.com/in/leon-konrad">LinkedIn</a>
      <a href="mailto:leon@leonkonrad.de">Email</a>
    </div>
  </section>

  <section class="contact">
    <h2>Get in touch</h2>
    <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="a5c6c009-ed97-41fd-b07b-e8a76fdd94dc">
      <input type="hidden" name="subject" value="New message from leonkonrad.de">
      <input type="hidden" name="redirect" value="https://leonkonrad.de">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button type="submit">Send</button>
      <p class="form-status" id="form-status"></p>
    </form>
  </section>

  <script>
    // Theme toggle
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const isDark = current === 'dark' ||
        (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Form submission via fetch (stay on page)
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const formData = Object.fromEntries(new FormData(form));
        const res = await fetch(form.action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });
        const data = await res.json();
        if (data.success) {
          status.textContent = 'Message sent!';
          status.classList.add('success');
          form.reset();
        } else {
          throw new Error(data.message || 'Something went wrong');
        }
      } catch (err) {
        status.textContent = err.message;
        status.classList.add('error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    });
  </script>
</body>
</html>
