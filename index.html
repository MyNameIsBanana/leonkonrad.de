<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leon Konrad</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #111;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: #111;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Leon Konrad</h1>
    <p class="tagline">Software &amp; AI</p>
    <div class="links">
      <a href="https://linkedin.com/in/leon-konrad">LinkedIn</a>
      <a href="mailto:leon@leonkonrad.de">Email</a>
    </div>
  </div>
</body>
</html>
